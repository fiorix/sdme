name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  ZIG_VERSION: "0.14.1"
  ZIG_SHA256: "24aeeec8af16c381934a6cd7d95c807a8cb2cf7df9fa40d359aa884195c4716c"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Every publishing job depends on this one, so a packaging version that
      # lags Cargo.toml fails the release before anything ships. v0.14.0 went to
      # Copr labelled 0.13.1 for want of this check.
      - name: Check packaging versions
        run: ./packaging/check-versions.sh
      - name: Run tests
        run: cargo test --locked --verbose

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            binary: sdme-x86_64-linux
          - target: aarch64-unknown-linux-musl
            binary: sdme-aarch64-linux

    steps:
      - uses: actions/checkout@v5

      - name: Install Zig
        run: |
          curl -sL -o zig.tar.xz "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          echo "${ZIG_SHA256}  zig.tar.xz" | sha256sum -c -
          mkdir -p "$HOME/.zig"
          tar -xJf zig.tar.xz -C "$HOME/.zig" --strip-components=1
          echo "$HOME/.zig" >> "$GITHUB_PATH"
          rm zig.tar.xz

      - name: Install cargo-zigbuild
        run: cargo install --locked cargo-zigbuild

      - name: Add rustup target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo zigbuild --locked --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/sdme ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

      - name: Upload target binaries
        uses: actions/upload-artifact@v4
        with:
          name: target-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/sdme

  package:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
          - target: aarch64-unknown-linux-musl

    steps:
      - uses: actions/checkout@v5

      - name: Install packaging tools
        run: |
          cargo install cargo-deb cargo-generate-rpm
          sudo apt-get update -qq && sudo apt-get install -y -qq libarchive-tools fakeroot zstd

      - name: Download target binary
        uses: actions/download-artifact@v4
        with:
          name: target-${{ matrix.target }}
          path: target/${{ matrix.target }}/release

      - name: Download x86_64 binary for completions
        uses: actions/download-artifact@v4
        with:
          name: target-x86_64-unknown-linux-musl
          path: /tmp/sdme-bin

      - name: Generate completions and AppArmor profile
        run: |
          chmod +x /tmp/sdme-bin/sdme
          mkdir -p packaging/out/completions packaging/out/apparmor
          /tmp/sdme-bin/sdme config completions bash > packaging/out/completions/sdme.bash
          /tmp/sdme-bin/sdme config completions zsh > packaging/out/completions/_sdme
          /tmp/sdme-bin/sdme config completions fish > packaging/out/completions/sdme.fish
          /tmp/sdme-bin/sdme config apparmor-profile > packaging/out/apparmor/sdme-default

      - name: Ensure binaries are executable
        run: chmod +x target/${{ matrix.target }}/release/sdme

      - name: Build deb
        run: cargo deb --no-build --no-strip --target ${{ matrix.target }}

      - name: Build rpm
        run: cargo generate-rpm --target ${{ matrix.target }}

      - name: Build pkg
        run: ./packaging/arch/build-pkg.sh ${{ matrix.target }}

      - name: Collect packages
        run: |
          mkdir -p packages
          cp target/debian/*.deb packages/
          cp target/${{ matrix.target }}/generate-rpm/*.rpm packages/
          cp target/${{ matrix.target }}/pkg/*.pkg.tar.zst packages/
          ls -lh packages/

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.target }}
          path: packages/*

  release:
    needs: [build, package]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum */sdme-*-linux */*.deb */*.rpm */*.pkg.tar.zst > SHA256SUMS
          cat SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*/sdme-*-linux
            artifacts/*/*.deb
            artifacts/*/*.rpm
            artifacts/*/*.pkg.tar.zst
            artifacts/SHA256SUMS

  # Build the Debian source package from the tag and upload it to the Launchpad
  # PPA (which then builds amd64 + arm64). Source-package assembly does not
  # compile, so the stock runner is fine; the Launchpad build is offline against
  # the vendored crates. No-ops without the signing secret (e.g. on forks).
  launchpad:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install packaging tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq debhelper devscripts dpkg-dev dput gnupg xz-utils

      # Authenticate the PPA upload over SFTP with an SSH key registered on
      # Launchpad, instead of dput's anonymous FTP default. No-op without the
      # key secret (dput then keeps the ftp method).
      - name: Configure dput sftp
        env:
          LP_SSH_KEY: ${{ secrets.LAUNCHPAD_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$LP_SSH_KEY" ]; then
            echo "LAUNCHPAD_SSH_PRIVATE_KEY not set; dput keeps the ftp default."
            exit 0
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$LP_SSH_KEY" > ~/.ssh/launchpad
          chmod 600 ~/.ssh/launchpad
          ssh-keyscan -H ppa.launchpad.net >> ~/.ssh/known_hosts 2>/dev/null
          cat >> ~/.ssh/config <<'SSHEOF'
          Host ppa.launchpad.net
            User fiorix
            IdentityFile ~/.ssh/launchpad
            IdentitiesOnly yes
          SSHEOF
          # Overrides the stock [ppa] stanza (method = ftp) host-wide; dput
          # resolves ppa:owner/name through this section.
          cat > ~/.dput.cf <<'DPUTEOF'
          [ppa]
          fqdn = ppa.launchpad.net
          method = sftp
          incoming = ~%(ppa)s/ubuntu
          login = fiorix
          allow_unsigned_uploads = 0
          DPUTEOF
          echo "dput will use sftp for the [ppa] host."

      - name: Build Debian source package
        run: bash packaging/debian/make-source-package.sh "${GITHUB_REF_NAME#v}"

      - name: Sign and upload to the PPA
        env:
          LP_KEY: ${{ secrets.LAUNCHPAD_GPG_PRIVATE_KEY }}
          LP_PASS: ${{ secrets.LAUNCHPAD_GPG_PASSPHRASE }}
        run: |
          if [ -z "$LP_KEY" ]; then
            echo "LAUNCHPAD_GPG_PRIVATE_KEY not set; skipping PPA upload."
            exit 0
          fi
          GNUPGHOME=$(mktemp -d); chmod 700 "$GNUPGHOME"; export GNUPGHOME
          printf 'allow-loopback-pinentry\nallow-preset-passphrase\n' > "$GNUPGHOME/gpg-agent.conf"
          gpgconf --kill gpg-agent >/dev/null 2>&1 || true
          echo "$LP_KEY" | gpg --batch --import
          gpg-connect-agent /bye >/dev/null 2>&1 || true
          KEYID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec:/{print $5; exit}')
          if [ -n "$LP_PASS" ]; then
            preset="$(gpgconf --list-dirs libexecdir)/gpg-preset-passphrase"
            gpg --batch --with-colons --with-keygrip --list-secret-keys \
              | awk -F: '/^grp:/{print $10}' \
              | while read -r grip; do "$preset" --preset "$grip" <<<"$LP_PASS"; done
          fi
          cd deb-src-out
          debsign -k"$KEYID" sdme_*_source.changes
          # Retry the upload: sftp/ftp to Launchpad occasionally drops. Force
          # (-f) on retries so a partially-recorded upload does not wedge.
          uploaded=
          for attempt in 1 2 3; do
            force=(); [ "$attempt" -gt 1 ] && force=(-f)
            if dput "${force[@]}" ppa:fiorix/sdme sdme_*_source.changes; then
              uploaded=1
              break
            fi
            [ "$attempt" -lt 3 ] && sleep 30
          done
          [ -n "$uploaded" ] || { echo "dput failed after 3 attempts"; exit 1; }

  # Publish both AUR packages: `sdme` (built from the tag tarball by the user)
  # and `sdme-bin` (repackages this release's static binaries). The AUR has no
  # build service, so a push IS the publish and nothing validates the PKGBUILD
  # server-side: makepkg runs here first, and only a green build gets pushed.
  # Needs `release` because sdme-bin sources the release assets, and because a
  # release that failed to build is not one to hand to Arch users. No-ops
  # without the SSH secret (e.g. on forks).
  aur:
    needs: release
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    strategy:
      # Independent AUR repos, so let one publish even if the other breaks.
      fail-fast: false
      matrix:
        pkgbase: [sdme, sdme-bin]
    steps:
      - name: Install build tools
        # Refresh the keyring first: if the image predates a signing key rotation
        # the subsequent -Su fails on "signature is unknown trust".
        run: |
          pacman -Sy --needed --noconfirm archlinux-keyring
          pacman -Su --needed --noconfirm base-devel git rust openssh

      - uses: actions/checkout@v5

      # makepkg refuses to run as root, and the container runs steps as root.
      - name: Create the builder user
        run: |
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Render the package
        run: |
          runuser -u builder -- env HOME=/home/builder \
            bash packaging/arch/make-aur-package.sh \
              "${{ matrix.pkgbase }}" "${GITHUB_REF_NAME#v}" "$GITHUB_WORKSPACE/aur-out"

      - name: Test build
        run: |
          runuser -u builder -- env HOME=/home/builder \
            bash -c 'cd "$0" && makepkg -f --noconfirm' \
              "$GITHUB_WORKSPACE/aur-out/${{ matrix.pkgbase }}"

      - name: Push to the AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          PKGBASE: ${{ matrix.pkgbase }}
        run: |
          if [ -z "$AUR_SSH_KEY" ]; then
            echo "AUR_SSH_PRIVATE_KEY not set; skipping the AUR push."
            exit 0
          fi
          # Absolute paths, never ~. Bash expands ~ from $HOME, which the runner
          # sets to /github/home for container jobs, but ssh expands it from the
          # passwd entry (/root for this container). Writing to ~/.ssh therefore
          # puts the key and known_hosts somewhere ssh never looks, which failed
          # v0.15.0 with "Host key verification failed".
          printf '%s\n' "$AUR_SSH_KEY" > /tmp/aur-key
          chmod 600 /tmp/aur-key
          # Pinned, not ssh-keyscan'd: this is the fingerprint the AUR publishes
          # at https://aur.archlinux.org/, so there is no reason to trust
          # whatever answers on the day instead.
          cat > /tmp/aur-known-hosts <<'EOF'
          aur.archlinux.org ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEuBKrPzbawxA/k2g6NcyV5jmqwJ2s+zpgZGZ7tpLIcN
          EOF
          export GIT_SSH_COMMAND="ssh -i /tmp/aur-key -o IdentitiesOnly=yes -o UserKnownHostsFile=/tmp/aur-known-hosts -o StrictHostKeyChecking=yes"
          version="${GITHUB_REF_NAME#v}"
          git config --global user.name "Alexandre Fiori"
          git config --global user.email "fiorix@gmail.com"
          git clone "ssh://aur@aur.archlinux.org/$PKGBASE.git" /tmp/aur
          # Only these three files belong in an AUR repo; the test build left
          # src/ and pkg/ behind next to them.
          cp "$GITHUB_WORKSPACE/aur-out/$PKGBASE"/{PKGBUILD,.SRCINFO,sdme.install} /tmp/aur/
          cd /tmp/aur
          git add PKGBUILD .SRCINFO sdme.install
          if git diff --cached --quiet; then
            echo "$PKGBASE is already at $version on the AUR; nothing to push."
            exit 0
          fi
          git commit -m "upgpkg: $PKGBASE $version-1"
          # HEAD:master, not master: the local branch is whatever init.defaultBranch
          # says, which is not necessarily what the AUR wants. Cloning an existing
          # repo happens to give master, but an empty one (a package that does not
          # exist yet) gives the default and then "push origin master" fails with
          # "src refspec master does not match any".
          git push origin HEAD:master

  # Poke Fedora Copr to rebuild the SCM package. Copr builds its configured
  # committish (the default branch), which equals the tag once the release
  # procedure has pushed main before the tag. Makes the trigger visible in this
  # workflow instead of relying on an external GitHub->Copr webhook. No-op
  # without the webhook secret.
  copr:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Copr build
        env:
          WEBHOOK: ${{ secrets.COPR_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "COPR_WEBHOOK not set; skipping Copr trigger."
            exit 0
          fi
          curl -sf -X POST "${WEBHOOK}sdme/"
